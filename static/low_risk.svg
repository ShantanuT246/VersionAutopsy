    <path d="M 30,15.36 A 40,40 0 0,1 70,15.36" stroke="#f1c40f" stroke-width="16" fill="none" stroke-linecap="butt"/>
    <path d="M 70,15.36 A 40,40 0 0,1 90,50" stroke="#e74c3c" stroke-width="16" fill="none" stroke-linecap="butt"/>
  </g>
  <g transform="rotate(-60 50 50)" filter="url(#needleShadow)">
